name: 打包并自动发布股票监控应用 # Pack & Auto Release Stock Monitor

on:
  push:
    paths:
      - 'stock_monitor/version.py'
  workflow_dispatch: # 允许手动触发工作流

permissions:
  contents: write  # 写入仓库内容权限
  packages: write  # 写入包权限

jobs:
  build:
    runs-on: windows-latest  # 在最新的Windows环境下运行

    steps:
    - name: 检出代码 # Checkout code
      uses: actions/checkout@v4

    - name: 设置 Python 环境 # Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'  # 与本地开发环境保持一致
        cache: 'pip' # 启用 pip 缓存

    - name: 缓存 PyInstaller # Cache PyInstaller builds
      uses: actions/cache@v4
      with:
        path: ~\AppData\Roaming\pyinstaller
        key: ${{ runner.os }}-pyinstaller-${{ hashFiles('**/requirements.txt', '**/requirements-dev.txt') }}
        restore-keys: |
          ${{ runner.os }}-pyinstaller-

    - name: 安装依赖项 # Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
        pip install pyinstaller
        # 强制重新安装 akshare 和 mootdx 以确保路径可访问
        pip install akshare --force-reinstall
        pip install mootdx --force-reinstall

    - name: 验证所需文件是否存在 # Verify required files exist
      run: |
        echo "检查所需文件:"
        Get-ChildItem stock_monitor/resources/
        echo "图标文件是否存在:"
        Test-Path stock_monitor/resources/icon.ico

    - name: 查找easyquotation的stock_codes.conf文件 # Find easyquotation stock_codes.conf
      id: find_eq
      run: |
        python -c "import easyquotation, os; print(os.path.dirname(easyquotation.__file__))" > eq_path.txt
        $EQPATH = Get-Content eq_path.txt | Select-Object -First 1
        echo "EQPATH=$EQPATH" | Out-File -FilePath $env:GITHUB_ENV -Append

    # - name: 运行测试 # Run tests
    #   run: |
    #     python -m pytest tests/

    - name: 验证 akshare 和 mootdx 安装 # Verify akshare and mootdx installation
      run: |
        echo "验证 mootdx 安装:"
        python -c "import mootdx; print(f'mootdx version: {mootdx.__version__}')"
        python -c "from mootdx.quotes import Quotes; print('mootdx.quotes import OK')"
        echo ""
        echo "验证 akshare 安装:"
        python -c "import akshare; print(f'akshare version: {akshare.__version__}')"
        python -c "import akshare; import os; print(f'akshare path: {os.path.dirname(akshare.__file__)}')"
        echo "验证所需模块:"
        python -c "import lxml; import bs4; import html5lib; print('All parsing libraries OK')"
    
    
    - name: 查找 zhconv 的 zhcdict.json 文件 # Find zhconv zhcdict.json
      id: find_zhconv
      run: |
        python -c "import zhconv, os; print(os.path.dirname(zhconv.__file__))" > zhconv_path.txt
        $ZHCONVPATH = Get-Content zhconv_path.txt | Select-Object -First 1
        echo "ZHCONVPATH=$ZHCONVPATH" | Out-File -FilePath $env:GITHUB_ENV -Append



    - name: 使用 PyInstaller 构建主程序 # Build main program with PyInstaller
      run: |
        # 先清理之前的构建
        Remove-Item -Recurse -Force build,dist -ErrorAction SilentlyContinue
        
        # 显示当前目录结构
        echo "=== 当前目录结构 ==="
        Get-ChildItem -Recurse -Depth 2 | Select-Object FullName
        
        # 检查 hooks 目录
        echo "=== 检查 hooks 目录 ==="
        if (Test-Path "stock_monitor/hooks") {
            echo "hooks 目录存在"
            Get-ChildItem "stock_monitor/hooks/"
        } else {
            echo "ERROR: hooks 目录不存在!"
            exit 1
        }
        
        # 带详细日志构建
        echo "=== 开始构建 ==="
        pyinstaller -y --log-level=INFO stock_monitor.spec
        
        echo "构建完成，检查产物:"
        Get-ChildItem dist/stock_monitor -Recurse | Select-Object FullName



    - name: 列出dist目录内容 # List dist directory
      run: |
        ls dist

    - name: 压缩产物(包含updater.exe) # Zip artifact (including updater.exe)
      run: |
        powershell Compress-Archive -Path dist/stock_monitor/* -DestinationPath stock_monitor.zip

    - name: 计算 SHA256 哈希值 # Calculate SHA256 Hash
      id: get_hash
      run: |
        $hash = (Get-FileHash stock_monitor.zip -Algorithm SHA256).Hash
        echo "SHA256: $hash"
        echo "$hash" | Out-File -FilePath sha256.txt -NoNewline
        echo "hash=$hash" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

    - name: 上传产物 # Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: stock-monitor
        path: |
          stock_monitor.zip
          sha256.txt

    - name: 编写版本提取脚本 # Write version extract script
      shell: bash
      run: |
        echo "import re" > get_version.py
        echo "s=open('pyproject.toml',encoding='utf-8').read()" >> get_version.py
        echo "m=re.search(r\"version\\s*=\\s*['\\\"]([\\d\\.]+)['\\\"]\", s)" >> get_version.py
        echo "print(f'version=v{m.group(1)}' if m else 'version=unknown')" >> get_version.py

    - name: 从main.py获取版本号 # Get version from main.py
      id: get_version
      shell: bash
      run: |
        version=$(python get_version.py)
        echo "version=${version#version=}" >> $GITHUB_OUTPUT

    - name: 从CHANGELOG.md提取更新日志 # Extract changelog from CHANGELOG.md
      id: extract_changelog
      shell: python
      run: |
        import re
        import os
        import sys

        # 设置编码
        if sys.platform == "win32":
            os.environ["PYTHONIOENCODING"] = "utf-8"
            # 设置标准输出和错误流编码（Python 3.7+支持）
            if hasattr(sys.stdout, 'reconfigure'):
                sys.stdout.reconfigure(encoding='utf-8')
            if hasattr(sys.stderr, 'reconfigure'):
                sys.stderr.reconfigure(encoding='utf-8')

        # 读取版本号
        version = "${{ steps.get_version.outputs.version }}"
        print(f"处理版本号: {version}")

        # 去掉开头的'v'字符，确保匹配
        if version.startswith('v'):
            version = version[1:]

        # 读取CHANGELOG.md文件并提取指定版本的更新日志
        with open('CHANGELOG.md', 'r', encoding='utf-8') as f:
            content = f.read()

        print(f"处理后的版本号: {version}")
        print("CHANGELOG.md 文件内容前200字符:")
        print(content[:200])

        # 构造正则表达式匹配特定版本的日志
        # 同时支持 ## [2.4.0] 和 ## [v2.4.0] 两种格式
        pattern = r"## \[v?" + re.escape(version) + r"\](.*?)(?=## \[v?|\Z)"
        print(f"使用的正则表达式: {pattern}")
        match = re.search(pattern, content, re.DOTALL)

        if match:
            changelog = match.group(1).strip()
            print("成功提取日志:")
            print(repr(changelog))
        else:
            changelog = "暂无详细更新日志"
            print("未找到匹配的日志")

        # 安全地输出到GitHub Actions，避免编码问题
        try:
            # 输出到GitHub Actions
            with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as f:
                f.write('changelog<<EOF\n')
                f.write(changelog + '\n')
                f.write('EOF\n')
            print("日志提取完成")
        except Exception as e:
            print(f"写入GITHUB_OUTPUT时出错: {e}")
            # 即使写入失败也要确保工作流继续执行
            with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                f.write('changelog=暂无详细更新日志\n')
        print("日志提取完成")

    - name: 创建发布 # Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          stock_monitor.zip
          sha256.txt
        tag_name: stock_monitor_${{ steps.get_version.outputs.version }}
        name: stock_monitor_${{ steps.get_version.outputs.version }}
        body: |
          🤖 stock_monitor_${{ steps.get_version.outputs.version }} 发布说明

          > **本软件完全由AI自动开发。**

          **SHA256**: `${{ steps.get_hash.outputs.hash }}`

          ${{ steps.extract_changelog.outputs.changelog }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
